# Cloudflare Workers configuration for DomisLink Empire
name = "domislink-empire"
compatibility_date = "2024-01-01"

# Hub App (domislink.com)
[[pages_projects]]
name = "domislink-hub"
production_branch = "main"
build_command = "npm run build:hub"
build_output_directory = "apps/hub/.next"

[pages_projects.env_vars]
NODE_ENV = "production"

