apiVersion: apps/v1
kind: Deployment
metadata:
  name: geolocation-service
  labels:
    app: geolocation-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geolocation-service
  template:
    metadata:
      labels:
        app: geolocation-service
    spec:
      containers:
      - name: geolocation-service
        image: ghcr.io/amaechiu-del/domislink-geolocation-service:latest
        ports:
        - containerPort: 4002
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "4002"
        envFrom:
        - configMapRef:
            name: geolocation-service-config
        - secretRef:
            name: geolocation-service-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4002
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: geolocation-service
  labels:
    app: geolocation-service
spec:
  type: ClusterIP
  ports:
  - port: 4002
    targetPort: 4002
    protocol: TCP
  selector:
    app: geolocation-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: geolocation-service-config
data:
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: geolocation-service-secrets
type: Opaque
stringData:
  # Add secrets here
  DATABASE_URL: ""
