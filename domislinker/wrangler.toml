name = "domislinker-api"
main = "workers/api.js"
compatibility_date = "2024-01-01"

# Environment variables
[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"

# D1 Database configuration (uncomment and update with actual database ID when ready)
# [[d1_databases]]
# binding = "DB"
# database_name = "domislinker-db"
# database_id = "<your-actual-d1-database-id>"

# KV Namespaces (if needed)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# R2 Buckets (if needed for file storage)
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "domislinker-images"