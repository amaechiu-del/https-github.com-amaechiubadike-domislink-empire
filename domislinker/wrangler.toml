name = "domislinker-api"
main = "workers/api.js"
compatibility_date = "2024-01-01"

[env.production]
name = "domislinker-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "domislinker-db"
database_id = "your-d1-database-id"

[env.staging]
name = "domislinker-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "domislinker-db-staging"
database_id = "your-staging-d1-database-id"

# Environment variables
[vars]
ENVIRONMENT = "production"
API_VERSION = "v1"

# KV Namespaces (if needed)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# R2 Buckets (if needed for file storage)
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "domislinker-images"