<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - DomisLinker</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/theme-manager.js"></script>
    <script src="./js/error-tracker.js"></script>
    <script src="./js/privacy-compliance.js"></script>
    <script src="./js/age-verification.js"></script>
    <script src="./js/accessibility.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo"><a href="./index.html">🏠 DomisLinker</a></h1>
            <nav>
                <a href="./dashboard.html" class="active">Dashboard</a>
                <a href="./post-ad.html" class="btn-primary">Post Ad</a>
                <button onclick="logout()" class="btn-secondary">Logout</button>
            </nav>
        </div>
    </header>

    <section class="dashboard">
        <div class="container">
            <h2>Agent Dashboard</h2>
            
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Active Listings</h3>
                    <div class="stat-number" id="activeListings">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Views</h3>
                    <div class="stat-number" id="totalViews">0</div>
                </div>
                <div class="stat-card">
                    <h3>Inquiries</h3>
                    <div class="stat-number" id="inquiries">0</div>
                </div>
                <div class="stat-card">
                    <h3>Commission Earned</h3>
                    <div class="stat-number" id="commission">$0</div>
                </div>
            </div>

            <div class="dashboard-content">
                <div class="dashboard-section">
                    <h3>My Listings</h3>
                    <div id="agentListings" class="listings-grid">
                        <!-- Agent listings loaded by JS -->
                    </div>
                </div>

                <div class="dashboard-section">
                    <h3>Recent Inquiries</h3>
                    <div id="recentInquiries" class="inquiries-list">
                        <!-- Inquiries loaded by JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/app.js"></script>
    <script src="./js/agent.js"></script>
    <script>
        loadAgentDashboard();
    </script>
</body>
</html>
