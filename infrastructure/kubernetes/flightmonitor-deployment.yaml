apiVersion: apps/v1
kind: Deployment
metadata:
  name: flightmonitor
  labels:
    app: flightmonitor
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flightmonitor
  template:
    metadata:
      labels:
        app: flightmonitor
    spec:
      containers:
      - name: flightmonitor
        image: ghcr.io/amaechiu-del/domislink-flightmonitor:latest
        ports:
        - containerPort: 3003
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        envFrom:
        - configMapRef:
            name: flightmonitor-config
        - secretRef:
            name: flightmonitor-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flightmonitor
  labels:
    app: flightmonitor
spec:
  type: ClusterIP
  ports:
  - port: 3003
    targetPort: 3003
    protocol: TCP
  selector:
    app: flightmonitor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flightmonitor-config
data:
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: flightmonitor-secrets
type: Opaque
stringData:
  # Add secrets here
  DATABASE_URL: ""
