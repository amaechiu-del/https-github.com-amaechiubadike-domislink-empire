name: Build and Deploy Microservices

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/**'
      - 'gateway/**'
      - 'docker-compose.microservices.yml'
      - '.github/workflows/microservices-deploy.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'services/**'
      - 'gateway/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/domislink

jobs:
  # Detect which services have changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth-service: ${{ steps.filter.outputs.auth-service }}
      payments-service: ${{ steps.filter.outputs.payments-service }}
      geolocation-service: ${{ steps.filter.outputs.geolocation-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      hub: ${{ steps.filter.outputs.hub }}
      realestate: ${{ steps.filter.outputs.realestate }}
      tickets: ${{ steps.filter.outputs.tickets }}
      flightmonitor: ${{ steps.filter.outputs.flightmonitor }}
      teachmaster: ${{ steps.filter.outputs.teachmaster }}
      admin: ${{ steps.filter.outputs.admin }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            payments-service:
              - 'services/payments-service/**'
            geolocation-service:
              - 'services/geolocation-service/**'
            notification-service:
              - 'services/notification-service/**'
            hub:
              - 'services/hub/**'
            realestate:
              - 'services/realestate/**'
            tickets:
              - 'services/tickets/**'
            flightmonitor:
              - 'services/flightmonitor/**'
            teachmaster:
              - 'services/teachmaster/**'
            admin:
              - 'services/admin/**'
            gateway:
              - 'gateway/**'

  # Build and push Docker images for backend services
  build-backend-services:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            changed: ${{ needs.detect-changes.outputs.auth-service }}
          - name: payments-service
            changed: ${{ needs.detect-changes.outputs.payments-service }}
          - name: geolocation-service
            changed: ${{ needs.detect-changes.outputs.geolocation-service }}
          - name: notification-service
            changed: ${{ needs.detect-changes.outputs.notification-service }}
    
    if: matrix.service.changed == 'true'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service.name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and push Docker images for frontend services
  build-frontend-services:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: hub
            changed: ${{ needs.detect-changes.outputs.hub }}
          - name: realestate
            changed: ${{ needs.detect-changes.outputs.realestate }}
          - name: tickets
            changed: ${{ needs.detect-changes.outputs.tickets }}
          - name: flightmonitor
            changed: ${{ needs.detect-changes.outputs.flightmonitor }}
          - name: teachmaster
            changed: ${{ needs.detect-changes.outputs.teachmaster }}
          - name: admin
            changed: ${{ needs.detect-changes.outputs.admin }}
    
    if: matrix.service.changed == 'true'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service.name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and push API Gateway
  build-gateway:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.gateway == 'true'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging/production
  deploy:
    needs: [build-backend-services, build-frontend-services, build-gateway]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Deploying to staging environment..."
          # Add deployment commands here
          # e.g., kubectl apply, docker stack deploy, etc.
      
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to production environment..."
          # Add production deployment commands here
          # Should include approval/manual trigger
