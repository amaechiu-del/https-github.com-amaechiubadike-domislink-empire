apiVersion: apps/v1
kind: Deployment
metadata:
  name: teachmaster
  labels:
    app: teachmaster
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teachmaster
  template:
    metadata:
      labels:
        app: teachmaster
    spec:
      containers:
      - name: teachmaster
        image: ghcr.io/amaechiu-del/domislink-teachmaster:latest
        ports:
        - containerPort: 3004
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3004"
        envFrom:
        - configMapRef:
            name: teachmaster-config
        - secretRef:
            name: teachmaster-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: teachmaster
  labels:
    app: teachmaster
spec:
  type: ClusterIP
  ports:
  - port: 3004
    targetPort: 3004
    protocol: TCP
  selector:
    app: teachmaster
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: teachmaster-config
data:
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: teachmaster-secrets
type: Opaque
stringData:
  # Add secrets here
  DATABASE_URL: ""
