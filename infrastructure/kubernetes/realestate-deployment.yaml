apiVersion: apps/v1
kind: Deployment
metadata:
  name: realestate
  labels:
    app: realestate
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realestate
  template:
    metadata:
      labels:
        app: realestate
    spec:
      containers:
      - name: realestate
        image: ghcr.io/amaechiu-del/domislink-realestate:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        envFrom:
        - configMapRef:
            name: realestate-config
        - secretRef:
            name: realestate-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: realestate
  labels:
    app: realestate
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
  selector:
    app: realestate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: realestate-config
data:
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: realestate-secrets
type: Opaque
stringData:
  # Add secrets here
  DATABASE_URL: ""
